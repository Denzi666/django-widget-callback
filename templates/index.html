<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой виджет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        {% if success_message %}
        <p style="color: green; font-weight: bold;">{{ success_message }}</p>
        {% endif %}

        <h1>Оставить заявку</h1>

        <form method="POST" style = "text-align: left;">
            {% csrf_token %}
            
            <input type="hidden" name="company_api_key" value="123456789">
            
            <label>Твое имя:</label><br>
            <input type="text" name="client_name" class="form-control" required><br>

            <label>Телефон:</label><br>
            <input type="text" name="client_phone" class="form-control" required><br>

            <label>Сообщение:</label><br>
            <textarea name="client_message" class="form-control" required></textarea><br>

            <button type = "submit" class="btn btn-primary">Отправить заявку
            </button>
            
        </form>
    </div>
    
    ...
    ...
    ...

<div id="broom-chat-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 9999; font-family: sans-serif;">
    
    <div id="chat-circle" style="position: absolute; bottom: 0; right: 0; width: 60px; height: 60px; background-color: #007bff; border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; transition: transform 0.3s ease, visibility 0.3s;">
        🤖
    </div>

    <div id="chat-window" style="display: none; width: 320px; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; position: absolute; bottom: 0; right: 0;">
        
        <div style="background-color: #f8f9fa; padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
            <div style="font-weight: bold; font-size: 16px;">Чат с ИИ Broom 🤖</div>
            <div id="chat-close" style="cursor: pointer; color: #aaa; font-size: 24px; line-height: 20px; font-weight: bold;">&times;</div>
        </div>

        <div id="chat-messages" style="height: 250px; overflow-y: auto; padding: 15px; font-size: 14px; background-color: #fafafa;">
            <div style="margin-bottom: 10px; color: #555;"><em>ИИ: Привет! Чем я могу помочь?</em></div>
        </div>

        <div style="padding: 10px; border-top: 1px solid #eee; display: flex; gap: 8px; background-color: white;">
            <input type="text" id="chat-input" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; outline: none;" placeholder="Задайте вопрос...">
            <button id="send-btn" style="padding: 8px 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">👉</button>
        </div>
    </div>
</div>

<script>
    // Находим все нужные элементы в HTML
    const chatCircle = document.getElementById('chat-circle');
    const chatWindow = document.getElementById('chat-window');
    const chatClose = document.getElementById('chat-close');
    const sendBtn = document.getElementById('send-btn');
    const chatInput = document.getElementById('chat-input');
    const messagesContainer = document.getElementById('chat-messages');

    // ЛОГИКА ОТКРЫТИЯ И СВОРАЧИВАНИЯ
    
    // 1. Клик по круглой кнопке -> показать окно чата, скрыть кнопку
    chatCircle.addEventListener('click', function() {
        chatWindow.style.display = 'block'; // Показываем окно
        chatCircle.style.transform = 'scale(0)'; // Кнопка "сжимается" и исчезает
        setTimeout(() => { chatCircle.style.visibility = 'hidden'; }, 300); // Полностью скрываем через 0.3 сек
    });

    // 2. Клик по крестику '×' в заголовке -> скрыть окно, показать кнопку
    chatClose.addEventListener('click', function() {
        chatWindow.style.display = 'none'; // Скрываем окно
        chatCircle.style.visibility = 'visible'; // Возвращаем видимость кнопке
        chatCircle.style.transform = 'scale(1)'; // Кнопка "вырастает" обратно
    });


    // ЛОГИКА ОТПРАВКИ СООБЩЕНИЙ (осталась прежней)

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    function sendMessage() {
        const message = chatInput.value.trim();
        if (!message) return;

        // Отображаем сообщение пользователя
        messagesContainer.innerHTML += `<div style="margin-bottom: 10px; text-align: right;">
            <span style="background-color: #007bff; color: white; padding: 6px 10px; border-radius: 10px; display: inline-block;">${message}</span>
        </div>`;
        chatInput.value = '';
        
        // Автопрокрутка вниз
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Создаем и добавляем блок "Печатает..."
        messagesContainer.innerHTML += `<div id="ai-typing-status" style="margin-bottom: 10px;">
            <span style="background-color: #e9ecef; color: #666; padding: 6px 10px; border-radius: 10px; display: inline-block;">
                <em>ИИ Broom печатает...</em>
            </span>
        </div>`;
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        // Отправляем запрос на наш Бэкенд Django
        fetch('/api/chat/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({ message: message })
        })
        .then(response => response.json())
        .then(data => {
            if (data.reply) {
                // Красиво отображаем ответ ИИ с переносами строк
                const formattedReply = data.reply.replace(/\n/g, '<br>');
                messagesContainer.innerHTML += `<div style="margin-bottom: 10px;">
                    <span style="background-color: #e9ecef; color: #333; padding: 6px 10px; border-radius: 10px; display: inline-block;"><strong>ИИ Broom:</strong><br>${formattedReply}</span>
                </div>`;
            } else if (data.error) {
                messagesContainer.innerHTML += `<div style="color: red; margin-bottom: 10px;"><strong>Ошибка:</strong> ${data.error}</div>`;
            }
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        })
        .catch(error => {
            messagesContainer.innerHTML += `<div style="color: red; margin-bottom: 10px;"><strong>Ошибка сети</strong></div>`;
            console.error('Error:', error);
        });
    }
</script>
</body>
</html>
