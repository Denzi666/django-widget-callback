<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой виджет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #333; }
        p { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        {% if success_message %}
        <p style="color: green; font-weight: bold;">{{ success_message }}</p>
        {% endif %}

        <h1>Оставить заявку</h1>

        <form method="POST" style = "text-align: left;">
            {% csrf_token %}
            
            <input type="hidden" name="company_api_key" value="123456789">

            <label>Твое имя:</label><br>
            <input type="text" name="client_name" class="form-control" required><br>

            <label>Телефон:</label><br>
            <input type="text" name="client_phone" class="form-control" required><br>

            <label>Сообщение:</label><br>
            <textarea name="client_message" class="form-control" required></textarea><br>

            <button type = "submit" class="btn btn-primary">Отправить заявку
            </button>
            
        </form>
    </div>
</body>
</html>
